<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening YouTube...</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23FF0000'/><polygon points='38,28 38,72 72,50' fill='white'/></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center}
.yt-icon{width:56px;height:40px;background:#FF0000;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
.yt-icon::after{content:'';border-left:16px solid #fff;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:3px}
h1{font-size:20px;font-weight:700;margin-bottom:.5rem}
p{font-size:14px;color:#888;line-height:1.6;margin-bottom:1rem}
.spinner{width:36px;height:36px;border:3px solid #222;border-top-color:#FF0000;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{display:inline-block;background:#FF0000;color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;margin-top:.5rem}
.btn:hover{background:#cc0000}
.status{font-size:11px;color:#444;margin-top:1rem;font-family:monospace}
</style>
</head>
<body>
<div class="card">
  <div class="yt-icon"></div>
  <div class="spinner" id="spinner"></div>
  <h1 id="heading">Opening YouTube...</h1>
  <p id="subtext">Just a moment.</p>
  <div id="btnRow" style="display:none"><a id="openBtn" href="#" class="btn">Open in YouTube</a></div>
  <div class="status" id="status"></div>
</div>
<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  var v=p.get('v')||'';
  var c=p.get('c')||'';
  var list=p.get('list')||'';
  var t=p.get('t')||'';
  var heading=document.getElementById('heading');
  var subtext=document.getElementById('subtext');
  var spinner=document.getElementById('spinner');
  var btnRow=document.getElementById('btnRow');
  var openBtn=document.getElementById('openBtn');
  var status=document.getElementById('status');
  if(!v&&!c){
    spinner.style.display='none';
    heading.textContent='Invalid link';
    subtext.textContent='No video or channel ID found. Copy the Smart Link from YouTube Toolkit again.';
    status.textContent='Params received: "'+window.location.search+'"';
    return;
  }
  var webUrl,android,ios;
  if(v){
    var extra=(t?'&t='+t:'')+(list?'&list='+list:'');
    webUrl='https://www.youtube.com/watch?v='+v+extra;
    android='intent://www.youtube.com/watch?v='+v+extra+'#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url='+encodeURIComponent(webUrl)+';end';
    ios='vnd.youtube://'+v+(t?'?t='+t:'');
  } else {
    var ch=c.startsWith('@')?c:'@'+c;
    webUrl='https://www.youtube.com/'+ch;
    android='intent://www.youtube.com/'+ch+'#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url='+encodeURIComponent(webUrl)+';end';
    ios='vnd.youtube://www.youtube.com/'+ch;
  }
  openBtn.href=webUrl;
  var ua=navigator.userAgent||'';
  var isAnd=/android/i.test(ua);
  var isIOS=/iphone|ipad|ipod/i.test(ua);
  function fallback(){
    spinner.style.display='none';
    heading.textContent='Tap to open YouTube';
    subtext.textContent='App did not open automatically. Tap below.';
    btnRow.style.display='block';
  }
  if(isAnd){
    status.textContent='Android detected';
    subtext.textContent='Opening YouTube app...';
    window.location.href=android;
    setTimeout(fallback,2500);
  } else if(isIOS){
    status.textContent='iOS detected';
    subtext.textContent='Opening YouTube app...';
    window.location.href=ios;
    setTimeout(function(){window.location.href=webUrl;},1800);
    setTimeout(fallback,2500);
  } else {
    status.textContent='Desktop — redirecting to YouTube.com';
    window.location.href=webUrl;
  }
})();
</script>
</body>
</html>
